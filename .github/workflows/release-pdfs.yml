name: Release PDFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Libertine font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-linuxlibertine

      - uses: typst-community/setup-typst@v4

      - name: Compile Typst lessons
        run: |
          set -euo pipefail
          mkdir -p build
          while IFS= read -r file; do
            name=$(basename "$file" .typ)
            echo "Compiling $file -> build/$name.pdf"
            typst compile "$file" "build/$name.pdf" --root . --font-path /usr/share/fonts
          done < <(find courses/ -name '*.typ')

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.pdf
